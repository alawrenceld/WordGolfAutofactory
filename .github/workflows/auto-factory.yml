# LaunchDarkly Auto-Factory — Phase 1
#
# On every PR, a chain of LaunchDarkly AI-config agents classifies the PR and,
# when it's flag-worthy, creates a feature flag (targeting off) in the app
# project, wires it into the code, instruments guarded-release metrics, writes
# flag-on/off tests, and posts a verdict. Judges score the coding agents; the
# approval policy (auto-factory-approval-* flags) can gate risky steps.
#
# Why two checkouts (PR at repo root, tool in tool/): the factory must not live inside
# the analyzed tree — agent git ops never sweep it into the PR. PR code checks out
# at the workspace root (not a subdirectory) so ld-find-code-refs can find .git while
# scanning SANDBOX_ROOT (word-golf/). Previously path: app broke KG wrap points:
# "error parsing git branch name: repository does not exist" when --dir was word-golf.
#
# Setup (see word-golf/.env.example):
#   Secrets:   LD_SDK_KEY, LD_API_KEY, ANTHROPIC_API_KEY, CURSOR_API_KEY
#   Variable:  LD_APP_PROJECT_KEY  (e.g. word-golf)
# GITHUB_TOKEN is provided automatically by GitHub Actions.

name: LaunchDarkly Auto-Factory

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled] # labeled: resume a gated run via the approval label

permissions:
  contents: write # agents commit flag wiring, metrics, and tests to the PR branch
  pull-requests: write # post the summary comment
  checks: write # post the approval-gate status as a check run

jobs:
  auto-factory:
    runs-on: ubuntu-latest
    # CI-loop guard (secondary). Primary guard is in the action: agent commits
    # carry [skip ci], so the agents' pushes never create a workflow run.
    if: github.actor != 'github-actions[bot]'
    steps:
      # PR code at the repo root so git metadata and SANDBOX_ROOT (word-golf/) align
      # for ld-find-code-refs. Factory tool checks out separately under tool/.
      - name: Check out the PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0 # full history so git_diff can do base...HEAD

      - name: Check out the AutoFactory tool
        uses: actions/checkout@v4
        with:
          repository: alawrenceld/launchdarkly-auto-factory
          ref: main
          path: tool

      - uses: actions/setup-node@v4
        with:
          node-version: 24 # @cursor/sdk requires Node >=22.13

      - name: Install tool dependencies (provides @cursor/sdk)
        run: npm ci
        working-directory: tool

      # Knowledge graph (auto-factory-knowledge-graph flag): ld-find-code-refs at
      # the PR SHA for flag→code wrap-point edges. Without the binary the run
      # still succeeds — it warns and skips that source.
      - name: Install ld-find-code-refs (knowledge-graph wrap points)
        continue-on-error: true
        run: |
          curl -fsSL https://github.com/launchdarkly/ld-find-code-refs/releases/download/v2.14.0/ld-find-code-refs_2.14.0_linux_amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin ld-find-code-refs

      - name: Run AutoFactory Phase 1
        run: node "$GITHUB_WORKSPACE/tool/packages/phase1-resource-factory/dist/action.bundle.js"
        env:
          LD_SDK_KEY: ${{ secrets.LD_SDK_KEY }}
          LD_API_KEY: ${{ secrets.LD_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          LD_APP_PROJECT_KEY: ${{ vars.LD_APP_PROJECT_KEY }}
          GRAPH_KEY: gha-auto-factory
          ENABLE_FLAG_CREATION: "true" # create real flags/metrics in the app project
          ENABLE_CODE_CHANGES: "true" # commit wiring + tests to the PR branch
          # The Word Golf app lives in the word-golf/ subdirectory.
          SANDBOX_ROOT: word-golf
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          # Approvals are controlled by the auto-factory-approval-* flags in the
          # factory project (no APPROVAL_MODE override here — the flags decide).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
