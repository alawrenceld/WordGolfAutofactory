# Pull requests: build the Word Golf image to validate the Dockerfile.
# No push, no deploy — see word-golf-deploy.yml for production deploys.

name: Word Golf — Docker build check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "word-golf/**"
      - "!word-golf/**/*.md" # docs-only changes don't need a build
      - "!word-golf/docs/**"
      - ".github/workflows/word-golf-docker-validate.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: word-golf/package-lock.json
      - name: Install dependencies
        working-directory: word-golf
        run: npm ci
      - name: Typecheck
        working-directory: word-golf
        run: npm run typecheck
      - name: Test
        working-directory: word-golf
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: word-golf
          file: word-golf/Dockerfile
          platforms: linux/amd64
          push: false
          provenance: false
          build-args: |
            VITE_LD_CLIENT_ID=${{ vars.VITE_LD_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
