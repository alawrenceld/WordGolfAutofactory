# Build (and, on main, publish) the Word Golf web app container image.
#
# - Pull requests: build only, to validate the Dockerfile (no push).
# - Pushes to main / manual dispatch: build + push to GitHub Container Registry.
#
# The published image is Cloud Run-ready (nginx listens on $PORT, default 8080).
# Deployment to Cloud Run is a follow-up.

name: Build Word Golf image

on:
  push:
    branches: [main]
    paths:
      - "word-golf/**"
      - ".github/workflows/build-image.yml"
  pull_request:
    paths:
      - "word-golf/**"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/word-golf

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: word-golf
          file: word-golf/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
