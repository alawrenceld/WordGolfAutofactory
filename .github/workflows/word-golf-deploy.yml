# Build the Word Golf web app image and deploy it to AWS App Runner.
#
# - PR merged into main: a tiny `redeploy-on-merge` job re-invokes this workflow via
#   workflow_dispatch on `main`, and the `deploy` job then builds (linux/amd64), pushes
#   to Amazon ECR, and rolls App Runner to the fresh image.
# - Manual `workflow_dispatch`: same deploy path.
#
# PR Docker validation (build only, no deploy) lives in word-golf-docker-validate.yml.
#
# Why the merge → self-dispatch hop (instead of `on: push` to main): the AutoFactory
# commits flag wiring/metrics to the PR branch as github-actions[bot]. GitHub does not
# spawn `push`-triggered runs for merges whose commits came from GITHUB_TOKEN, so a plain
# `on: push` silently skips those merges. Re-dispatching runs the deploy in the
# main-branch context, so the GitHub OIDC subject stays `…:ref:refs/heads/main` and the
# AWS IAM trust policy needs no widening. No long-lived credentials (PATs) are involved:
# the dispatch uses the ephemeral GITHUB_TOKEN, and workflow_dispatch is the documented
# exception that still fires when invoked by GITHUB_TOKEN.
#
# Auth is keyless via GitHub OIDC → an IAM role (no stored AWS keys). The role,
# ECR repo, region, and service ARN come from repo variables; one-time AWS setup
# is documented in word-golf/docs/APP-RUNNER-DEPLOY.md.
#
# The app connects to LaunchDarkly only if VITE_LD_CLIENT_ID (the public,
# browser-embedded client-side ID) is baked in at build time, so it's passed as a
# build-arg from the repo variable of the same name. Without it the app builds and
# runs, but stays in offline mode (safe defaults, no flag evals, no LD events).

name: Word Golf — Deploy to App Runner

# Queue overlapping dispatches instead of racing App Runner (issue #27).
concurrency:
  group: word-golf-deploy
  cancel-in-progress: false

on:
  pull_request:
    types: [closed]
    # No paths: filter — GitHub's path evaluation for pull_request:closed is
    # unreliable when the base branch moves fast or bot commits land after open
    # (issue #26). The redeploy job only dispatches; idempotent and cheap.
  workflow_dispatch:

jobs:
  # On merge into main: re-invoke this workflow on `main` so the deploy runs in the
  # main-branch OIDC context (keeps the IAM trust pinned to main; no PAT needed).
  redeploy-on-merge:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      actions: write # dispatch this workflow via the ephemeral GITHUB_TOKEN
    steps:
      - name: Dispatch deploy on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run word-golf-deploy.yml --ref main -R "${{ github.repository }}"

  # Manual / merge-dispatched: build → push to ECR → deploy to App Runner.
  deploy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for GitHub OIDC → AWS
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: word-golf
          file: word-golf/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPO }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPO }}:${{ github.sha }}
          build-args: |
            VITE_LD_CLIENT_ID=${{ vars.VITE_LD_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to App Runner and wait
        env:
          SERVICE_ARN: ${{ vars.AWS_APPRUNNER_SERVICE_ARN }}
        run: |
          set -euo pipefail

          wait_for_running() {
            for i in $(seq 1 30); do
              ST=$(aws apprunner describe-service --service-arn "$SERVICE_ARN" \
                --query 'Service.Status' --output text)
              echo "[$i] service status: $ST"
              if [ "$ST" = "RUNNING" ]; then
                return 0
              fi
              if [ "$i" -eq 30 ]; then
                echo "Timed out waiting for service to reach RUNNING (last: $ST)"
                return 1
              fi
              sleep 15
            done
          }

          wait_for_running

          OP=""
          for attempt in $(seq 1 10); do
            if err=$(aws apprunner start-deployment --service-arn "$SERVICE_ARN" \
                  --query OperationId --output text 2>&1); then
              OP="$err"
              echo "Started App Runner deployment: $OP"
              break
            fi
            if echo "$err" | grep -q "isn't in RUNNING state"; then
              echo "[$attempt] Service not RUNNING yet, waiting before retry..."
              wait_for_running
            else
              echo "$err"
              exit 1
            fi
            if [ "$attempt" -eq 10 ]; then
              echo "Failed to start deployment after 10 attempts"
              exit 1
            fi
          done

          for i in $(seq 1 40); do
            ST=$(aws apprunner list-operations --service-arn "$SERVICE_ARN" \
                  --query "OperationSummaryList[?Id=='${OP}'].Status | [0]" --output text)
            echo "[$i] operation status: $ST"
            case "$ST" in
              SUCCEEDED) break ;;
              FAILED|ROLLBACK_IN_PROGRESS|ROLLBACK_SUCCEEDED|ROLLBACK_FAILED)
                echo "Deployment did not succeed: $ST"; exit 1 ;;
            esac
            if [ "$i" -eq 40 ]; then echo "Timed out waiting for deployment"; exit 1; fi
            sleep 15
          done
          URL=$(aws apprunner describe-service --service-arn "$SERVICE_ARN" --query 'Service.ServiceUrl' --output text)
          echo "Deployed → https://${URL}"
          {
            echo "### Word Golf deployed to App Runner 🚀"
            echo "**URL:** https://${URL}"
            echo "**Image tag:** \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
